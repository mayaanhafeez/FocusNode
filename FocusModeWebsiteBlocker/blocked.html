<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Focus Mode</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#0b1220; color:#e5e7eb; margin:0; }
      .wrap { max-width:720px; margin:80px auto; padding:24px; border:1px solid rgba(148,163,184,.18); border-radius:16px; background:rgba(15,23,42,.55); }
      .btn { padding:10px 12px; border-radius:12px; border:1px solid rgba(148,163,184,.22); background:rgba(148,163,184,.10); color:#e5e7eb; cursor:pointer; }
      .btn2 { padding:10px 12px; border-radius:12px; border:1px solid rgba(99,102,241,.45); background:rgba(99,102,241,.22); color:#e5e7eb; cursor:pointer; font-weight:600; }
      .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
      .muted { color: rgba(226,232,240,.75); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Focus Mode is ON</h1>
      <p class="muted">This site is blocked during your focus session:</p>
      <h2 id="site"></h2>

      <div class="row">
        <button class="btn" id="back">Go back</button>
        <button class="btn2" id="openOptions">Open Focus Settings</button>
        <button class="btn" id="turnOff">Turn off Focus Mode</button>
      </div>
    </div>

    <script src="blocked.js"></script>
  </body>
</html>
