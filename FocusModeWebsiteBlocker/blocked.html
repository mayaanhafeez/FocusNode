<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Focus Mode — Blocked</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --base:    #191724;
        --surface: #1f1d2e;
        --overlay: #26233a;
        --muted:   #6e6a86;
        --subtle:  #908caa;
        --text:    #e0def4;
        --love:    #eb6f92;
        --rose:    #ebbcba;
        --pine:    #31748f;
        --foam:    #9ccfd8;
        --hl-low:  #21202e;
        --hl-med:  #403d52;
      }

      html, body {
        height: 100%;
        background: var(--base);
        color: var(--text);
        font-family: 'ui-monospace','SFMono-Regular',Menlo,Monaco,Consolas,monospace;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        border: 1px solid var(--overlay);
      }

      .card-header {
        background: var(--surface);
        border-bottom: 1px solid var(--overlay);
        padding: 0 16px;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--subtle);
      }

      .card-header .dot { color: var(--love); font-size: 9px; }

      .card-body {
        background: var(--base);
        padding: 28px 24px 24px;
      }

      .section-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 16px;
      }

      .site-name {
        font-size: 22px;
        color: var(--rose);
        margin-bottom: 6px;
      }

      .site-desc {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 24px;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--overlay);
        margin-bottom: 20px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 7px 16px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        outline: none;
        border: 1px solid var(--overlay);
        background: transparent;
        color: var(--subtle);
        transition: border-color 0.15s, color 0.15s;
      }
      .btn:hover { border-color: var(--subtle); color: var(--text); }

      .btn-primary {
        border-color: #31748f55;
        background: #31748f15;
        color: var(--foam);
      }
      .btn-primary:hover { background: #31748f25; border-color: var(--pine); }

      .btn-off {
        border-color: #eb6f9244;
        background: #eb6f9212;
        color: var(--love);
      }
      .btn-off:hover { background: #eb6f9222; border-color: var(--love); }

      .statusline {
        background: var(--surface);
        border-top: 1px solid var(--overlay);
        height: 26px;
        display: flex;
        align-items: stretch;
        font-size: 11px;
      }

      .mode-pill {
        background: var(--love);
        color: var(--base);
        padding: 0 10px;
        display: flex;
        align-items: center;
        font-weight: 700;
        letter-spacing: 0.07em;
      }

      .sl-item {
        padding: 0 12px;
        display: flex;
        align-items: center;
        color: var(--subtle);
        border-right: 1px solid var(--overlay);
      }

      .sl-right {
        margin-left: auto;
        padding: 0 12px;
        display: flex;
        align-items: center;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <span class="dot">●</span>
        blocked.lua
      </div>
      <div class="card-body">
        <div class="section-label">-- access denied</div>
        <div class="site-name" id="site"></div>
        <div class="site-desc">blocked during your focus session</div>
        <hr class="divider" />
        <div class="actions">
          <button class="btn" id="back"><span style="color:var(--muted)">:</span>GoBack</button>
          <button class="btn btn-primary" id="openOptions"><span style="color:#31748f88">:</span>Settings</button>
          <button class="btn btn-off" id="turnOff"><span style="color:#eb6f9288">:</span>FocusOff</button>
        </div>
      </div>
      <div class="statusline">
        <div class="mode-pill">FOCUSED</div>
        <div class="sl-item">blocked.lua</div>
        <div class="sl-right" id="statusSite"></div>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
